- title: "Robustness of electronic screening effects in electron spectroscopies: example of V₂O₅"
  authors: "**V. Gorelov**, L. Reining, W. Lambrecht, M. Gatti"
  venue: "Phys. Rev. B 107, 075101 (2023)"
  year: 2023
  link: "https://doi.org/10.1103/PhysRevB.107.075101"
  image: "eps_G0Gp0.jpg"
  summary: >-
    Screening of excitations by the electron cloud is central to spectroscopic
    properties. We use V₂O₅ as a prototype to show how local distortions affect
    the screening, and how those changes propagate to EELS and absorption spectra,
    including excitons.

- title: "Delocalization of dark and bright strongly bound excitons in flat-band materials and the optical properties of V₂O₅"
  authors: "**V. Gorelov**, L. Reining, M. Feneberg, R. Goldhahn, A. Schleife, W. Lambrecht, M. Gatti"
  venue: "npj Comput. Mater. 8, 94 (2022)"
  year: 2022
  link: "https://doi.org/10.1038/s41524-022-00754-2"
  image: "exc_xy_7_ellipce.jpg"
  summary: >-
    Localized charge-transfer excitations can combine to form excitons with very
    large binding energy *and* large electron-hole distance — a seemingly contradictory
    finding we resolve in V₂O₅ by combining MBPT, ellipsometry, and tight-binding
    modelling. The mechanism is general.
