<!DOCTYPE html>
<html lang="en" class="no-theme-flash">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% seo %}
  <!-- Prevent flash: apply saved theme before paint. Dark is default. -->
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('theme');
        var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        // Dark is the default; only flip to light if user picked it, or
        // hasn't picked anything AND the OS explicitly prefers light.
        var theme = saved || (prefersLight ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
      document.documentElement.classList.remove('no-theme-flash');
      document.documentElement.classList.add('theme-loaded');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="site">
    {% include topbar.html %}

    <div class="layout">
      {% include sidebar.html %}

      <main class="content">
        {{ content }}
      </main>
    </div>

    {% include footer.html %}
  </div>

  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
</body>
</html>
